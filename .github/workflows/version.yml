name: Version

on:
  workflow_dispatch:
    inputs:
      files:
        description: 'File(s) to run action against (space separated)'
        required: true
  pull_request:
    branches: ["mc"]
  push:
    branches: ["mc"]
    paths:
    - '*.txt'
    - '*.json'
    - '*.png'
    - '.github/workflows/version.yml'

env:
  PYTHON_VERSION: "3.10"
  COSIGN_VERSION: "v2.2.3"
  MCOS_VERSION_S3_BUCKET: version-muthur-command
  MCOS_VERSION_S3_PUBLIC_BASE: http://s3.muthur-command.com
  MCOS_VERSION_PUBLIC_BASE: http://version.muthur-command.com
  # Set repo Variable MCOS_S3_NO_VERIFY_SSL=true only if the endpoint TLS/SNI is broken (lab). Production: fix cert/SAN on the server.
  MCOS_S3_NO_VERIFY_SSL: ${{ vars.MCOS_S3_NO_VERIFY_SSL }}
  SIGNED_FILES: "apparmor.txt apparmor_beta.txt apparmor_dev.txt apparmor_stable.txt beta.json dev.json stable.json"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
 
    - name: Lint JSON with jq
      run: |
        sudo apt-get update -qq && sudo apt-get install -y -qq jq
        for f in stable.json beta.json dev.json; do
          echo "Checking $f"
          jq empty "$f"
        done

  prepare:
    name: Prepare
    needs: ["lint"]
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.calc_file_list.outputs.changed_files }}
      sign_matrix: ${{ steps.calc_file_list.outputs.result }}
    steps:
    - name: Checkout the repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    
    - name: Get changed files for push
      if: github.event_name == 'push'
      id: changed_files_push
      uses: masesgroup/retrieve-changed-files@45a8b3b496d2d6037cbd553e8a3450989b9384a2 # v4.0.0
      with:
        format: 'json'

    - name: Calculate files to sign and push
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      id: calc_file_list
      with:
        script: |
          const signed_files = "${{ env.SIGNED_FILES }}".split(' ')
          if ("${{ github.event_name }}" === "push") {
            changed_files = JSON.parse('${{ steps.changed_files_push.outputs.all }}')
            // Sign all files in case this workflow changes.
            if (changed_files.includes(".github/workflows/version.yml")) {
              changed_files = [...new Set([...changed_files, ...signed_files])]
            }
            core.setOutput("changed_files", changed_files.join(' '))
            return changed_files.filter(value => signed_files.includes(value))
          } else {
            input_files = "${{ github.event.inputs.files }}".split(' ')
            core.setOutput("changed_files", input_files.join(' '))
            return input_files.filter(value => signed_files.includes(value))
          }
  
  signing:
    name: Sign ${{ matrix.path }}
    needs: ["prepare"]
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.prepare.outputs.sign_matrix != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    strategy:
      matrix:
        path: ${{ fromJson(needs.prepare.outputs.sign_matrix) }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: muthur-command
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Setup Python version ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install AWS CLI
        run: pip install awscli
      
      - name: Sign Cosign
        run: |
          cosign sign-blob --yes ${{ matrix.path }} --bundle ${{ matrix.path }}.sig

      - name: Upload signature
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          MCOS_S3_NO_VERIFY_SSL: ${{ env.MCOS_S3_NO_VERIFY_SSL }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "::error::Missing AWS credentials. In the GitHub repo, set Actions secrets AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY (S3-compatible keys for MCOS_VERSION_S3_PUBLIC_BASE / MCOS_VERSION_S3_BUCKET). See README.md."
            exit 1
          fi
          AWS_SSL=()
          if [ "${MCOS_S3_NO_VERIFY_SSL}" = "true" ]; then
            echo "::warning::MCOS_S3_NO_VERIFY_SSL=true — skipping TLS verify (not for production)."
            AWS_SSL=(--no-verify-ssl)
          fi
          aws "${AWS_SSL[@]}" s3 sync . "s3://${{ env.MCOS_VERSION_S3_BUCKET }}/" \
            --endpoint-url "${{ env.MCOS_VERSION_S3_PUBLIC_BASE }}" \
            --exclude "*" --include "${{ matrix.path }}.sig"


  upload:
    name: Upload
    needs: ["signing", "prepare"]
    # Make sure to run this job even if signing has been skipped.
    if: ${{ !failure() && !cancelled() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Python version ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install AWS CLI
      run: pip install awscli

    - name: Upload files
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        MCOS_S3_NO_VERIFY_SSL: ${{ env.MCOS_S3_NO_VERIFY_SSL }}
      run: |
        if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
          echo "::error::Missing AWS credentials. In the GitHub repo, set Actions secrets AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY. See README.md."
          exit 1
        fi
        AWS_SSL=()
        if [ "${MCOS_S3_NO_VERIFY_SSL}" = "true" ]; then
          echo "::warning::MCOS_S3_NO_VERIFY_SSL=true — skipping TLS verify (not for production)."
          AWS_SSL=(--no-verify-ssl)
        fi
        for file in ${{ needs.prepare.outputs.files }}; do
          if [[ "$file" =~ \.txt|\.json|\.png ]]; then
            aws "${AWS_SSL[@]}" s3 sync . "s3://${{ env.MCOS_VERSION_S3_BUCKET }}/" \
              --endpoint-url "${{ env.MCOS_VERSION_S3_PUBLIC_BASE }}" \
              --exclude "*" --include "$file"
          fi
        done

